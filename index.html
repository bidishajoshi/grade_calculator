<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Grade Calculator</h1>
      <p class="subtitle">Add students, enter marks, and generate detailed result sheets.</p>
    </header>

    <div class="tabs">
      <button class="tab active" onclick="showTab('input')">Input</button>
      <button class="tab" onclick="showTab('results')">Results <span id="results-count"></span></button>
    </div>

    <!-- INPUT TAB -->
    <div id="tab-input">
      <div class="card">
        <div class="section-title">Student Info</div>
        <div class="info-grid">
          <div>
            <label>Student name</label>
            <input type="text" id="student-name" placeholder="e.g. Aarav Sharma" />
          </div>
          <div>
            <label>Number of subjects</label>
            <input type="number" id="num-subjects" min="1" max="15" value="4" onchange="buildSubjects()" />
          </div>
        </div>
        <hr class="divider">
        <div class="section-title">Marks (0–100)</div>
        <div class="row-header">
          <span>Subject name</span>
          <span>Marks obtained</span>
          <span>Max marks</span>
        </div>
        <div id="subjects-container"></div>
        <button class="btn btn-sm" onclick="addSubjectRow()" style="margin-top:6px;">+ Add subject</button>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="calculate()">Calculate grades</button>
        <button class="btn" onclick="clearForm()">Clear</button>
      </div>
      <div id="form-error" class="error"></div>
    </div>

    <!-- RESULTS TAB -->
    <div id="tab-results" style="display:none;">
      <div id="students-list" class="students-list"></div>
      <div id="result-display"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
